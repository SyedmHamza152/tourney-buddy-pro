name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli

      - name: Initialize Capacitor (if not done)
        run: |
          npx cap init tourney-buddy-pro com.example.tourney
        if: "! -d android"

      - name: Add Android platform (if not done)
        run: |
          npx cap add android
        if: "! -d android"

      - name: Build web project
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: tourney-buddy-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
